# ═══════════════════════════════════════════════════════════════════════════════
# CI Workflow — Satellite Defence
# ═══════════════════════════════════════════════════════════════════════════════
# Runs on every push/PR: lint, unit tests, config validation, dry-run.

name: CI — Lint, Test & Validate

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  # ─── Lint & Import Check ───────────────────────────────────────────────────
  lint:
    name: Lint & Import Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate Python syntax
        run: |
          python -m py_compile pipeline.py
          python -m py_compile src/data/tile_prep.py
          python -m py_compile src/data/augmentation.py
          python -m py_compile src/train/train.py
          python -m py_compile src/eval/evaluate.py
          python -m py_compile src/eval/dashboard.py
          python -m py_compile src/eval/report.py
          python -m py_compile src/inference/infer_sahi.py

      - name: Validate imports
        run: |
          python -c "
          import src.data.tile_prep
          import src.data.augmentation
          import src.train.train
          import src.eval.evaluate
          import src.eval.dashboard
          import src.eval.report
          import src.inference.infer_sahi
          import src.inference.class_nms
          print('✓ All imports OK')
          "

  # ─── Unit Tests ────────────────────────────────────────────────────────────
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: python -m pytest tests/ -v --tb=short --junitxml=test-results.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results.xml

  # ─── Config & Pipeline Validation ─────────────────────────────────────────
  validate:
    name: Validate Config & Dry Run
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate pipeline config
        run: |
          python -c "
          import yaml
          from pathlib import Path
          cfg = yaml.safe_load(open('pipeline_config.yaml'))
          required = ['data', 'training', 'evaluation', 'quality_gate']
          for key in required:
              assert key in cfg, f'Missing config section: {key}'
          print('✓ Pipeline config valid')
          "

      - name: Validate dataset YAML
        run: |
          python -c "
          import yaml
          cfg = yaml.safe_load(open('src/data/dataset.yaml'))
          assert 'nc' in cfg, 'Missing nc in dataset.yaml'
          assert 'names' in cfg, 'Missing names in dataset.yaml'
          print(f'✓ Dataset config valid: {cfg[\"nc\"]} classes')
          "

      - name: Pipeline dry run
        run: python pipeline.py --stage all --dry-run --config pipeline_config.yaml
